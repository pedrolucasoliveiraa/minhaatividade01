<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Centro Farma</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
  <div class="login-card">
  <div class="logo-title">
    <img src="farmacialogo - Copia.png" alt="Logo Farmácia" class="logo">
    <h2>Centro Farma</h2>
  </div>
  <form>
    <div class="form-group">
      <label for="usuario">Login</label>
      <input type="text" id="usuario" placeholder="Digite seu login" maxlength="15">
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" maxlength="20">
    </div>
    <button type="submit" class="btn-login">Entrar</button>
    <button type="button" class="btn-reset">Redefinir senha</button>
  </form>
</div>
  </div>
</body>
</html>
